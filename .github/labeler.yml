feature:
  - changed-files:
      - any-glob-to-any-file: ["src/**"]
  - head-branch: ["^feature/", "^feat/"]

enhancement:
  - head-branch: ["^enhancement/", "^enh/"]

bugfix:
  - head-branch: ["^bugfix/", "^fix/"]

chore:
  - changed-files:
      - any-glob-to-any-file: [".github/**", "package.json", "pnpm-lock.yaml", "*.config.*"]
  - head-branch: ["^chore/", "^deps/"]

docs:
  - changed-files:
      - any-glob-to-any-file: ["**/*.md"]

refactor:
  - head-branch: ["^refactor/"]

security:
  - head-branch: ["^security/"]

tests:
  - changed-files:
      - any-glob-to-any-file: ["**/*.test.ts", "**/*.spec.ts", "test/**"]
  - head-branch: ["^test/", "^tests/"]
